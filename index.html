<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KFC Uzbekistan Mini App</title>
    <!-- Используем твои локальные файлы -->
    <link rel="stylesheet" href="bootstrap.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --kfc-red: #E4002B;
            --kfc-dark: #202124;
        }

        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 100px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Поиск сверху */
        .header-sticky {
            position: sticky;
            top: 0;
            z-index: 1020;
            background: #f8f9fa;
            padding: 10px 15px;
        }

        .search-box {
            background: #fff;
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #eee;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            width: 100%;
            outline: none;
        }

        /* Категории */
        .category-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 15px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .btn-category {
            border-radius: 20px;
            padding: 8px 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-weight: 600;
            color: #555;
            white-space: nowrap;
        }

        .btn-category.active {
            background: var(--kfc-red);
            color: white;
            border-color: var(--kfc-red);
        }

        /* Карточки еды */
        .food-card {
            border: none;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .food-card:active { transform: scale(0.96); }

        .food-img {
            width: 100%;
            height: 130px;
            object-fit: contain;
            padding: 10px;
        }

        .price-text {
            color: var(--kfc-red);
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Кнопки управления */
        .btn-add-main {
            background: var(--kfc-red);
            color: white;
            border: none;
            border-radius: 10px;
            width: 36px;
            height: 36px;
            font-weight: bold;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 4px 8px;
        }

        .btn-qty {
            background: none;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--kfc-dark);
            padding: 0 5px;
        }

        /* Нижняя панель заказа */
        .order-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 15px 20px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.08);
            display: none;
            z-index: 2000;
            border-radius: 20px 20px 0 0;
            justify-content: space-between;
            align-items: center;
        }

        .btn-checkout {
            background: var(--kfc-red);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="header-sticky">
        <input type="text" id="search" class="search-box" placeholder="Поиск блюд...">
    </div>

    <div class="category-scroll mb-2" id="categories">
        <button class="btn-category active" data-cat="all">Все</button>
        <button class="btn-category" data-cat="chicken">Курица</button>
        <button class="btn-category" data-cat="burgers">Бургеры</button>
        <button class="btn-category" data-cat="combo">Комбо</button>
        <button class="btn-category" data-cat="drinks">Напитки</button>
        <button class="btn-category" data-cat="sides">Гарниры</button>
    </div>

    <div class="container">
        <div class="row row-cols-2 g-3" id="menu-grid">
            <!-- Сюда JS вставит карточки -->
        </div>
    </div>

    <div class="order-panel" id="orderBar">
        <div>
            <div class="text-muted small">Итого:</div>
            <div class="fw-bold fs-5" id="totalPriceDisplay">0 сум</div>
        </div>
        <button class="btn-checkout" onclick="checkout()">Перейти к оплате</button>
    </div>

    <script src="bootstrap.bundle.min.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // База данных товаров
        const products = [
            { id: 1, cat: 'chicken', name: 'Баскет 16 Крыльев', price: 78000, img: 'https://www.kfc.com.uz/admin/files/3371.png', desc: 'Легендарные острые крылышки' },
            { id: 2, cat: 'burgers', name: 'Шефбургер Острый', price: 24000, img: 'https://www.kfc.com.uz/admin/files/4953.png', desc: 'Сочное филе в панировке' },
            { id: 3, cat: 'chicken', name: 'Стрипсы 3 шт', price: 18000, img: 'https://www.kfc.com.uz/admin/files/3364.png', desc: 'Нежное куриное филе' },
            { id: 4, cat: 'combo', name: 'Боксмастер Комбо', price: 42000, img: 'https://www.kfc.com.uz/admin/files/4958.png', desc: 'Боксмастер, фри и напиток' },
            { id: 5, cat: 'drinks', name: 'Пепси 0.5л', price: 9000, img: 'https://www.kfc.com.uz/admin/files/3305.png', desc: 'Освежающий напиток' },
            { id: 6, cat: 'burgers', name: 'Лонгер', price: 12000, img: 'https://www.kfc.com.uz/admin/files/4030.png', desc: 'Классический сэндвич' },
            { id: 7, cat: 'sides', name: 'Картофель Фри', price: 14000, img: 'https://www.kfc.com.uz/admin/files/3313.png', desc: 'Золотистый и хрустящий' },
            { id: 8, cat: 'chicken', name: 'Голени 2 шт', price: 17000, img: 'https://www.kfc.com.uz/admin/files/3358.png', desc: 'Ароматные ножки' }
        ];

        let cart = {}; // { productId: quantity }

        function render() {
            const grid = document.getElementById('menu-grid');
            const searchVal = document.getElementById('search').value.toLowerCase();
            const activeCat = document.querySelector('.btn-category.active').dataset.cat;

            grid.innerHTML = '';

            products.forEach(p => {
                if (activeCat !== 'all' && p.cat !== activeCat) return;
                if (searchVal && !p.name.toLowerCase().includes(searchVal)) return;

                const qty = cart[p.id] || 0;
                const card = document.createElement('div');
                card.className = 'col';
                card.innerHTML = `
                    <div class="food-card p-2">
                        <img src="${p.img}" class="food-img">
                        <div class="fw-bold small mt-1 text-truncate">${p.name}</div>
                        <div class="text-muted mb-2" style="font-size: 0.7rem;">${p.desc}</div>
                        <div class="mt-auto d-flex justify-content-between align-items-center">
                            <span class="price-text small">${p.price.toLocaleString()}</span>
                            <div id="btn-container-${p.id}">
                                ${qty === 0 
                                    ? `<button class="btn-add-main" onclick="changeQty(${p.id}, 1)">+</button>`
                                    : `<div class="qty-controls">
                                        <button class="btn-qty" onclick="changeQty(${p.id}, -1)">-</button>
                                        <span class="small fw-bold">${qty}</span>
                                        <button class="btn-qty" onclick="changeQty(${p.id}, 1)">+</button>
                                       </div>`}
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            updateOrderBar();
        }

        function changeQty(id, delta) {
            cart[id] = (cart[id] || 0) + delta;
            if (cart[id] <= 0) delete cart[id];
            render();
        }

        function updateOrderBar() {
            const bar = document.getElementById('orderBar');
            let total = 0;
            let count = 0;

            Object.keys(cart).forEach(id => {
                const p = products.find(prod => prod.id == id);
                total += p.price * cart[id];
                count += cart[id];
            });

            if (count > 0) {
                bar.style.display = 'flex';
                document.getElementById('totalPriceDisplay').innerText = total.toLocaleString() + ' сум';
            } else {
                bar.style.display = 'none';
            }
        }

        // Фильтр по категориям
        document.getElementById('categories').addEventListener('click', e => {
            if (e.target.classList.contains('btn-category')) {
                document.querySelectorAll('.btn-category').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                render();
            }
        });

        // Поиск
        document.getElementById('search').addEventListener('input', render);

        // Завершение заказа
        function checkout() {
            const data = {
                order: cart,
                total: document.getElementById('totalPriceDisplay').innerText
            };
            tg.sendData(JSON.stringify(data));
        }

        render();
    </script>
</body>
</html>
